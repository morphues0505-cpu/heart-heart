<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heart</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden; }
  #scene, #heart2 { position: fixed; inset: 0; width: 100%; height: 100%; }
  /* Phase 1 — THREE.js (AHXAA угсрах) */
  #scene { z-index: 2; transition: opacity 1.6s ease; }
  /* Phase 2 — 2D canvas (улаан trace зүрх) */
  #heart2 { z-index: 1; opacity: 0; transition: opacity 1.6s ease; display: block; }
  #heart-svg { position: absolute; width: 0; height: 0; visibility: hidden; }
  /* Дарж эхлүүлэх overlay (autoplay хоригийг тойрох) */
  #startOverlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55); cursor: pointer;
    transition: opacity 0.8s ease;
    font-family: "Segoe UI", system-ui, sans-serif;
  }
  #startOverlay .btn {
    color: #fff; font-size: clamp(20px, 5vw, 30px); font-weight: 600;
    padding: 18px 34px; border: 1.5px solid rgba(255,120,170,0.7);
    border-radius: 999px; background: rgba(255,60,120,0.12);
    backdrop-filter: blur(4px);
    animation: pulseGlow 1.4s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%,100% { transform: scale(1);   box-shadow: 0 0 18px rgba(255,80,140,0.35); }
    50%     { transform: scale(1.06); box-shadow: 0 0 36px rgba(255,80,140,0.6); }
  }
  /* Нуугдсан YouTube тоглуулагч (зөвхөн дуу) */
  #ytwrap {
    position: fixed; width: 1px; height: 1px;
    left: -9999px; top: -9999px; opacity: 0; pointer-events: none;
  }
</style>
</head>
<body>
  <div id="scene"></div>
  <canvas id="heart2"></canvas>
  <div id="startOverlay"><div class="btn">Дарж эхлүүлэх&nbsp;❤</div></div>
  <div id="ytwrap"><div id="ytplayer"></div></div>

  <svg id="heart-svg" viewBox="0 0 600 552">
    <path d="M300,540
      C300,540 30,360 30,180
      C30,80 110,30 190,30
      C250,30 290,70 300,110
      C310,70 350,30 410,30
      C490,30 570,80 570,180
      C570,360 300,540 300,540 Z" />
  </svg>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
  window.addEventListener("load", async () => {
    /* =====================================================
       PHASE 1 — THREE.js: particle-ууд "AHXAA"+зүрх угсарна
       ===================================================== */
    const container = document.getElementById("scene");
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 1, 5000
    );
    camera.position.z = 620;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const CX = 600 / 2, CY = 552 / 2;
    const parts = [];
    function addParticle(ex, ey, ez, col) {
      parts.push({
        sx: ex + (Math.random() - 0.5) * 30,
        sy: ey + (Math.random() - 0.5) * 30,
        sz: ez + (Math.random() - 0.5) * 70,
        ex, ey, ez,
        delay: Math.random() * 0.5,
        dur: 0.4 + Math.random() * 0.5,
        r: col[0], g: col[1], b: col[2],
      });
    }

    // зүрхэн контур (ягаан)
    const HEART = [1.0, 0.37, 0.69];
    const path = document.querySelector("path");
    const length = path.getTotalLength();
    for (let i = 0; i < length; i += 0.6) {
      const pt = path.getPointAtLength(i);
      addParticle(pt.x - CX, -(pt.y - CY), 0, HEART);
    }
    // "AHXAA" текст (алтан, уран бичмэл фонт)
    const GOLD = [1.0, 0.82, 0.29];
    const FONT = "160px 'Great Vibes', cursive"; // бичмэл фонт
    // фонт ачаалагдсаныг баталгаажуулна (canvas draw-аас өмнө)
    try { await document.fonts.load(FONT); await document.fonts.ready; } catch (e) {}
    const cw = 860, ch = 300;
    const cv = document.createElement("canvas");
    cv.width = cw; cv.height = ch;
    const tctx = cv.getContext("2d");
    tctx.fillStyle = "#fff";
    tctx.textAlign = "center";
    tctx.textBaseline = "middle";
    tctx.font = FONT;
    tctx.fillText("AHXAA", cw / 2, ch / 2);
    const timg = tctx.getImageData(0, 0, cw, ch).data;
    const STEP = 3, TS = 0.5, TY = -10;
    for (let y = 0; y < ch; y += STEP)
      for (let x = 0; x < cw; x += STEP)
        if (timg[(y * cw + x) * 4 + 3] > 128)
          addParticle((x - cw / 2) * TS, -(y - ch / 2) * TS + TY, 0, GOLD);

    const N = parts.length;
    const positions = new Float32Array(N * 3);
    const colors = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      colors[i * 3] = parts[i].r;
      colors[i * 3 + 1] = parts[i].g;
      colors[i * 3 + 2] = parts[i].b;
    }
    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
    const material = new THREE.PointsMaterial({
      size: 2.6, vertexColors: true, transparent: true,
      opacity: 0.95, blending: THREE.AdditiveBlending, depthTest: false,
    });
    const points = new THREE.Points(geometry, material);
    scene.add(points);

    const state = { p: 0 };
    const ease = (t) => (t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2);
    const clamp01 = (v) => (v < 0 ? 0 : v > 1 ? 1 : v);

    let phase1Running = true;
    let phase2Started = false;
    // нэг удаа угсраад, бариад → Phase 2 руу шилжинэ
    gsap.to(state, {
      p: 1, duration: 4.5, ease: "none",
      onComplete: () => {
        // 1.5 сек бариад дараа нь шилжих
        gsap.delayedCall(1.5, startPhase2);
      },
    });
    // RAF throttle-д баригдсан ч шилжилт баталгаатай болгох fallback
    setTimeout(startPhase2, 6500);

    function renderP1() {
      if (!phase1Running) return;
      const pos = geometry.attributes.position.array;
      const p = state.p;
      for (let i = 0; i < N; i++) {
        const pt = parts[i];
        const local = ease(clamp01((p - pt.delay) / pt.dur));
        const j = i * 3;
        pos[j]     = pt.sx + (pt.ex - pt.sx) * local;
        pos[j + 1] = pt.sy + (pt.ey - pt.sy) * local;
        pos[j + 2] = pt.sz + (pt.ez - pt.sz) * local;
      }
      geometry.attributes.position.needsUpdate = true;
      points.rotation.y = Math.sin(Date.now() * 0.0003) * 0.1;
      renderer.render(scene, camera);
      requestAnimationFrame(renderP1);
    }
    renderP1();

    /* =====================================================
       PHASE 2 — 2D canvas: улаан trace зүрхэн анимаци
       (зурган дахь parametric heart кодын дагуу)
       ===================================================== */
    function startPhase2() {
      if (phase2Started) return;
      phase2Started = true;
      // Phase 1 бүдгэрч, Phase 2 гарч ирнэ
      container.style.opacity = "0";
      heartStart();
      const h2 = document.getElementById("heart2");
      h2.style.opacity = "1";
      // THREE render-г зогсоох (нөөц чөлөөлөх)
      setTimeout(() => { phase1Running = false; }, 1700);
    }

    function heartStart() {
      const canvas = document.getElementById("heart2");
      const ctx = canvas.getContext("2d");
      const rand = Math.random;
      let width, height;

      // parametric heart цэг
      const heartPosition = (rad) => [
        Math.pow(Math.sin(rad), 3),
        -(15 * Math.cos(rad) - 5 * Math.cos(2 * rad)
          - 2 * Math.cos(3 * rad) - Math.cos(4 * rad)),
      ];
      const scaleAndTranslate = (pos, sx, sy, dx, dy) =>
        [dx + pos[0] * sx, dy + pos[1] * sy];

      let pointsOrigin, heartPointsCount, targetPoints = [], e = [];
      const traceCount = 50;
      const config = { traceK: 0.4, timeDelta: 0.01 };
      let time = 0;

      function build() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        const f = Math.min(width, height) / 700; // дэлгэцэнд тааруулах
        pointsOrigin = [];
        const dr = window.innerWidth < 700 ? 0.3 : 0.1;
        for (let i = 0; i < Math.PI * 2; i += dr)
          pointsOrigin.push(scaleAndTranslate(heartPosition(i), 210 * f, 13 * f, 0, 0));
        for (let i = 0; i < Math.PI * 2; i += dr)
          pointsOrigin.push(scaleAndTranslate(heartPosition(i), 150 * f, 9 * f, 0, 0));
        for (let i = 0; i < Math.PI * 2; i += dr)
          pointsOrigin.push(scaleAndTranslate(heartPosition(i), 90 * f, 5 * f, 0, 0));
        heartPointsCount = pointsOrigin.length;

        e = [];
        for (let i = 0; i < heartPointsCount; i++) {
          const x = rand() * width, y = rand() * height;
          e[i] = {
            vx: 0, vy: 0, R: 2,
            speed: rand() + 5,
            q: ~~(rand() * heartPointsCount),
            D: 2 * (i % 2) - 1,
            force: 0.2 * rand() + 0.7,
            f: "hsla(0," + ~~(40 * rand() + 100) + "%," + ~~(60 * rand() + 20) + "%,.3)",
            trace: [],
          };
          for (let k = 0; k < traceCount; k++) e[i].trace[k] = { x, y };
        }
      }

      function pulse(kx, ky) {
        for (let i = 0; i < pointsOrigin.length; i++) {
          targetPoints[i] = [
            kx * pointsOrigin[i][0] + width / 2,
            ky * pointsOrigin[i][1] + height / 2,
          ];
        }
      }

      function loop() {
        const n = -Math.cos(time);
        pulse((1 + n) * 0.5, (1 + n) * 0.5);
        time += (Math.sin(time) < 0 ? 9 : n > 0.8 ? 0.2 : 1) * config.timeDelta;

        ctx.fillStyle = "rgba(0,0,0,.1)";
        ctx.fillRect(0, 0, width, height);

        for (let i = e.length; i--; ) {
          const u = e[i];
          const q = targetPoints[u.q];
          let dx = u.trace[0].x - q[0];
          let dy = u.trace[0].y - q[1];
          const len = Math.sqrt(dx * dx + dy * dy);
          if (10 > len) {
            if (0.95 < rand()) {
              u.q = ~~(rand() * heartPointsCount);
            } else {
              if (0.99 < rand()) u.D *= -1;
              u.q += u.D;
              u.q %= heartPointsCount;
              if (0 > u.q) u.q += heartPointsCount;
            }
          }
          u.vx += (-dx / len) * u.speed;
          u.vy += (-dy / len) * u.speed;
          u.trace[0].x += u.vx;
          u.trace[0].y += u.vy;
          u.vx *= u.force;
          u.vy *= u.force;
          for (let k = 0; k < u.trace.length - 1; ) {
            const T = u.trace[k];
            const Nn = u.trace[++k];
            Nn.x -= config.traceK * (Nn.x - T.x);
            Nn.y -= config.traceK * (Nn.y - T.y);
          }
          ctx.fillStyle = u.f;
          for (let k = 0; k < u.trace.length; k++)
            ctx.fillRect(u.trace[k].x, u.trace[k].y, 1, 1);
        }
        requestAnimationFrame(loop);
      }

      build();
      window.addEventListener("resize", build);
      loop();
    }

    /* Phase 1 responsive */
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* =====================================================
       SOUND — зүрхний цохилт + зөөлөн дэвсгэр хөгжим
       (WebAudio-гоор шууд үүсгэнэ, файл шаардлагагүй)
       ===================================================== */
    function startAudio() {
      const AC = new (window.AudioContext || window.webkitAudioContext)();
      const master = AC.createGain();
      master.gain.value = 0.7;
      master.connect(AC.destination);

      // ---- Зүрхний цохилт (lub-dub) ----
      const beatGain = AC.createGain();
      beatGain.gain.value = 0.85; // тод сонсогдох цохилт
      beatGain.connect(master);
      function thump(time, freq, dur, vol) {
        const o = AC.createOscillator();
        o.type = "sine";
        o.frequency.setValueAtTime(freq * 1.6, time);
        o.frequency.exponentialRampToValueAtTime(freq, time + 0.06);
        const g = AC.createGain();
        g.gain.setValueAtTime(0.0001, time);
        g.gain.linearRampToValueAtTime(vol, time + 0.015);
        g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
        o.connect(g).connect(beatGain);
        o.start(time);
        o.stop(time + dur + 0.05);
      }
      function heartbeat() {
        const t = AC.currentTime + 0.02;
        thump(t, 58, 0.16, 0.9);          // lub
        thump(t + 0.21, 46, 0.22, 0.65);  // dub
      }
      heartbeat();
      setInterval(heartbeat, 1150); // ~52 bpm — тайван цохилт
    }

    /* =====================================================
       MUSIC — жинхэнэ "River Flows in You" (Yiruma)
       нуугдсан YouTube тоглуулагчаар (бүх төхөөрөмжид ижил)
       ===================================================== */
    const YT_ID = "7maJOI3QMu0"; // Yiruma — River Flows in You (албан ёсны)
    let ytPlayer = null, ytReady = false, wantPlay = false;

    window.onYouTubeIframeAPIReady = function () {
      ytPlayer = new YT.Player("ytplayer", {
        width: "1", height: "1",
        videoId: YT_ID,
        playerVars: {
          autoplay: 0, controls: 0, disablekb: 1, modestbranding: 1,
          loop: 1, playlist: YT_ID, rel: 0, playsinline: 1,
        },
        events: {
          onReady: () => {
            ytReady = true;
            if (wantPlay) { ytPlayer.setVolume(55); ytPlayer.playVideo(); }
          },
        },
      });
    };
    (function loadYT() {
      const s = document.createElement("script");
      s.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(s);
    })();

    // Дарж эхлүүлэх — нэг товшилтоор дуу+хөгжим асаана
    const overlay = document.getElementById("startOverlay");
    let audioOn = false;
    function begin() {
      if (audioOn) return;
      audioOn = true;
      try { startAudio(); } catch (e) {}          // зүрхний цохилт
      wantPlay = true;                             // River Flows in You
      if (ytReady && ytPlayer) { ytPlayer.setVolume(55); ytPlayer.playVideo(); }
      overlay.style.opacity = "0";
      setTimeout(() => (overlay.style.display = "none"), 800);
    }
    overlay.addEventListener("click", begin);
    overlay.addEventListener("touchstart", begin, { passive: true });
  });
  </script>
</body>
</html>
